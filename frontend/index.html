<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sandbox</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>AI Sandbox</h1>
    </header>

    <main>

        <section class="editor-section">

            <h2>Code Editor</h2>

            <textarea id="code-editor">
#include <stdio.h>

int main() {
    printf("Hello Sandbox\n");
    return 0;
}
            </textarea>

            <button id="run-btn">
                Run in Sandbox
            </button>
            <div class="test-buttons">
               <button class="test-btn" id="hello-test">Hello World</button>
               <button class="test-btn" id="compile-test">Compile Error</button>
               <button class="test-btn" id="timeout-test">Timeout</button>
               <button class="test-btn" id="runtime-test">Runtime Error</button>
               <button class="test-btn" id="memory-test">Memory Test</button>
            </div>

        </section>

        <section class="status-section">

            <h2>Sandbox Status</h2>

            <div class="status-box">
                <p>Namespace: Enabled</p>
                <p>Seccomp: Enabled</p>
                <p>Cgroup: Enabled</p>
            </div>

            <h2>Resource Monitor</h2>

            <div class="resource-box">
                <p id="cpu-usage">CPU Usage: 0%</p>
                <p id="memory-usage">Memory Usage: 0 MB</p>
                <p id="execution-time">Execution Time: 0 s</p>
            </div>

        </section>
        <section class="history-section">

           <h2>Run History</h2>

           <div id="history-list">

           </div>

       </section>

    </main>

    <section class="output-section">

        <h2>Program Output</h2>

        <pre id="output-box">
Hello Sandbox
        </pre>

    </section>

    <script src="script.js"></script>

</body>
</html>
