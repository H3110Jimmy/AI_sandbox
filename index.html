<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sandbox</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>AI Sandbox</h1>
    </header>

    <main class="main-layout">

        <section class="panel editor-panel">
            <h2>Code Editor</h2>

            <textarea id="code-editor">#include <stdio.h>

int main() {
    printf("Hello Sandbox\n");
    return 0;
}</textarea>

            <div class="button-row">
                <button id="run-btn">Run in Sandbox</button>
            </div>

            <div class="test-buttons">
                <button class="test-btn" id="hello-test">Hello World</button>
                <button class="test-btn" id="compile-test">Compile Error</button>
                <button class="test-btn" id="timeout-test">Timeout</button>
                <button class="test-btn" id="runtime-test">Runtime Error</button>
                <button class="test-btn" id="memory-test">Memory Test</button>
            </div>
        </section>

        <section class="panel output-panel">
            <h2>Program Output</h2>

            <pre id="output-box">Hello Sandbox</pre>
        </section>

    </main>

    <section class="dashboard-layout">

        <section class="panel dashboard-card">
            <h2>Resource Monitor</h2>

            <div class="info-box">
                <p id="cpu-usage">CPU Usage: 0%</p>
                <p id="memory-usage">Memory Usage: 0 MB</p>
                <p id="execution-time">Execution Time: 0 s</p>
            </div>
        </section>

        <section class="panel dashboard-card history-panel">
            <h2>Run History</h2>

            <div id="history-list"></div>
        </section>

    </section>

    <script src="script.js"></script>

</body>
</html>
